{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тесты по {{ subject_name }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h2 class="mb-4">Тесты по {{ subject_name }}</h2>

    <div class="list-group">
        {% for t in tests %}
        <a href="{% url 'test' t.id %}" class="list-group-item list-group-item-action">
            <h5 class="mb-1">{{ t.title }}</h5>
            {% if t.description %}<small>{{ t.description }}</small>{% endif %}
        </a>
        {% empty %}
        <p>Тесты отсутствуют.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
